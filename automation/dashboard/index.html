<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV autoenvio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --surface: #0f0f0f;
            --border: #1a1a1a;
            --accent: #3b82f6;
            --success: #10b981;
            --error: #ef4444;
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            overflow-x: hidden;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: var(--surface); border: 1px solid var(--border); }
        .card-hover:hover { border-color: var(--accent); background: #151515; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); animation: pulse-soft 2s infinite; }
        
        .tab-active { border-bottom: 2px solid var(--accent); color: var(--accent); }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="border-b border-[var(--border)] px-6 py-4 flex justify-between items-center bg-[var(--bg)]/80 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-lg flex items-center justify-center font-bold text-white shadow-lg shadow-blue-500/20">C</div>
            <h1 class="text-xl font-bold tracking-tight">CV <span class="text-[var(--text-dim)] font-light">autoenvio</span></h1>
        </div>
        <div class="flex items-center gap-6">
            <div class="flex gap-4 text-xs font-bold uppercase tracking-widest">
                <button onclick="switchTab('jobs')" id="tab-jobs-btn" class="tab-active py-2">Vagas</button>
            </div>
            <div class="flex items-center gap-2 px-3 py-1.5 rounded-full glass">
                <div class="live-dot"></div>
                <span id="status-display" class="text-[10px]">System Online</span>
            </div>
        </div>
    </nav>

    <main class="flex-1 p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 max-w-[1600px] mx-auto w-full">
        <!-- Sidebar - Search & Upload -->
        <aside class="lg:col-span-3 space-y-6">
            <!-- Upload Resume Section -->
            <section class="glass rounded-2xl p-6 shadow-2xl border-l-4 border-l-indigo-500">
                <h2 class="text-sm font-bold uppercase tracking-wider text-[var(--text-dim)] mb-4 flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    Seu Currículo
                </h2>
                <div class="space-y-4">
                    <div id="upload-zone" class="border-2 border-dashed border-[var(--border)] rounded-xl p-4 text-center cursor-pointer hover:border-indigo-500/50 transition-all">
                        <input type="file" id="resume-file" class="hidden" accept=".pdf" onchange="handleFileUpload(event)">
                        <label for="resume-file" class="cursor-pointer">
                            <span class="text-xs text-[var(--text-dim)] block mb-2">Arraste seu PDF aqui ou</span>
                            <span class="bg-indigo-600/20 text-indigo-400 px-3 py-1 rounded-lg text-[10px] font-bold uppercase">Selecionar Arquivo</span>
                        </label>
                    </div>
                    <p id="upload-status" class="text-[9px] text-center text-[var(--text-dim)]"></p>
                </div>
            </section>

            <section class="glass rounded-2xl p-6 shadow-2xl">
                <h2 class="text-sm font-bold uppercase tracking-wider text-[var(--text-dim)] mb-6 flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    Busca Inteligente
                </h2>
                <div class="space-y-5">
                    <div>
                        <label class="block text-[10px] font-bold text-[var(--text-dim)] uppercase mb-1 ml-1">Cargo</label>
                        <input type="text" id="query-input" placeholder="Ex: Backend Developer" 
                            class="w-full bg-[var(--bg)] border border-[var(--border)] rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/40 transition-all">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-[var(--text-dim)] uppercase mb-1 ml-1">Localização</label>
                        <input type="text" id="location-input" placeholder="Ex: Brasil (Remoto)" 
                            class="w-full bg-[var(--bg)] border border-[var(--border)] rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/40 transition-all">
                    </div>
                    <button onclick="triggerSearch()" id="btn-search" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition-all flex items-center justify-center gap-2 shadow-xl shadow-blue-900/20 active:scale-[0.98]">
                        <span>Otimizar Carreira</span>
                    </button>
                </div>
            </section>

            <!-- Console Log -->
            <section class="glass rounded-2xl p-6 h-[400px] flex flex-col shadow-2xl">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-sm font-bold uppercase tracking-wider text-[var(--text-dim)] flex items-center gap-2">
                        <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                        Terminal
                    </h2>
                </div>
                <div id="terminal" class="flex-1 overflow-y-auto mono text-[10px] leading-relaxed space-y-1.5 p-3 bg-black/40 rounded-lg border border-white/5">
                    <div class="text-blue-400"># ICO_OS v2.1 initialized...</div>
                </div>
            </section>
        </aside>

        <!-- Main Content Area -->
        <div class="lg:col-span-9">
            <!-- Jobs Tab -->
            <div id="tab-jobs" class="space-y-6">
                <header class="flex justify-between items-end">
                    <div>
                        <h2 class="text-3xl font-bold">Oportunidades</h2>
                        <p class="text-[var(--text-dim)] text-sm">IA processando vagas com base no seu perfil.</p>
                    </div>
                    <button onclick="fetchJobs()" class="px-4 py-2 text-xs font-bold glass rounded-lg hover:bg-white/5 transition-all">Atualizar</button>
                </header>

                <div id="job-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="col-span-full py-20 text-center glass rounded-3xl">
                        <h3 class="text-lg font-bold">Aguardando busca...</h3>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Modal for Job Details (Keep existing logic) -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[100] hidden items-center justify-center p-6 overflow-y-auto">
        <div class="max-w-3xl w-full glass rounded-3xl shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 w-10 h-10 rounded-full glass flex items-center justify-center">✕</button>
            <div id="modal-body" class="p-8 md:p-12"></div>
        </div>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const jobGrid = document.getElementById('job-grid');
        const modalOverlay = document.getElementById('modal-overlay');
        const modalBody = document.getElementById('modal-body');
        
        let allJobs = [];

        function switchTab(tab) {
            const jobsTab = document.getElementById('tab-jobs');
            const roadmapTab = document.getElementById('tab-roadmap');
            const jobsBtn = document.getElementById('tab-jobs-btn');
            const roadmapBtn = document.getElementById('tab-roadmap-btn');

            if (tab === 'jobs') {
                jobsTab.classList.remove('hidden');
                roadmapTab.classList.add('hidden');
                jobsBtn.classList.add('tab-active');
                roadmapBtn.classList.remove('tab-active');
                roadmapBtn.classList.add('text-[var(--text-dim)]');
            } else {
                jobsTab.classList.add('hidden');
                roadmapTab.classList.remove('hidden');
                roadmapBtn.classList.add('tab-active');
                jobsBtn.classList.remove('tab-active');
                jobsBtn.classList.add('text-[var(--text-dim)]');
            }
        }

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const status = document.getElementById('upload-status');
            status.innerText = "Enviando...";
            status.classList.remove('text-red-400', 'text-emerald-400');

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (data.status === 'success') {
                    status.innerText = "✓ Currículo pronto!";
                    status.classList.add('text-emerald-400');
                    addLog(`Currículo atualizado: ${file.name}`, 'success');
                } else {
                    status.innerText = "✗ Erro no upload.";
                    status.classList.add('text-red-400');
                }
            } catch (err) {
                status.innerText = "✗ Erro de conexão.";
                status.classList.add('text-red-400');
            }
        }

        function addLog(msg, type = 'info') {
            const line = document.createElement('div');
            const color = type === 'error' ? 'text-red-400' : (type === 'success' ? 'text-emerald-400' : 'text-slate-400');
            line.className = color;
            line.innerHTML = `<span class="text-slate-600">>></span> ${msg}`;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }

        const eventSource = new EventSource('/api/stream');
        eventSource.onmessage = (event) => {
            const data = JSON.parse(event.data);
            addLog(data.message);
            if (data.message.includes('✨') || data.message.includes('concluído')) fetchJobs();
        };

        async function triggerSearch() {
            const query = document.getElementById('query-input').value;
            const location = document.getElementById('location-input').value;
            if (!query) return alert('Defina um cargo.');
            addLog(`Buscando: ${query}...`, 'success');
            fetch('/api/search', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ query, location })
            });
        }

        async function fetchJobs() {
            try {
                const response = await fetch('/api/jobs');
                allJobs = await response.json();
                renderJobs();
            } catch (err) { addLog('Erro ao carregar vagas.', 'error'); }
        }

        function renderJobs() {
            if (allJobs.length === 0) return;
            jobGrid.innerHTML = allJobs.map((job, idx) => {
                const scoreColor = job.score >= 85 ? 'text-emerald-400' : (job.score < 50 ? 'text-red-400' : 'text-amber-400');
                return `
                <div class="glass rounded-2xl p-6 card-hover transition-all cursor-pointer group flex flex-col relative overflow-hidden" onclick="openJob(${idx})">
                    <div class="flex justify-between items-start mb-4">
                        <div class="space-y-1">
                            <span class="text-[10px] font-black uppercase tracking-widest text-[var(--text-dim)]">${job.company}</span>
                            <h3 class="text-lg font-bold group-hover:text-blue-400 transition-colors line-clamp-1">${job.title}</h3>
                        </div>
                        <div class="text-right">
                            <div class="text-2xl font-black ${scoreColor}">${job.score}%</div>
                        </div>
                    </div>
                    <div class="flex gap-3 mt-auto">
                        <button class="flex-1 py-2.5 rounded-lg glass text-xs font-bold">Ver Detalhes</button>
                        <button onclick="event.stopPropagation(); applyToJob(${idx})" class="flex-1 py-2.5 rounded-lg bg-emerald-600/10 text-emerald-400 text-xs font-bold">Auto-Apply</button>
                    </div>
                </div>
                `;
            }).join('');
        }

        function openJob(idx) {
            const job = allJobs[idx];
            modalBody.innerHTML = `
                <h2 class="text-4xl font-bold">${job.title}</h2>
                <p class="text-xl text-blue-400 font-medium mb-6">${job.company}</p>
                <div class="space-y-6">
                    <section>
                        <h4 class="text-xs font-black uppercase tracking-widest text-[var(--text-dim)] mb-2">Análise</h4>
                        <p class="text-lg text-slate-200 leading-relaxed">${job.match_summary || 'Sem análise.'}</p>
                    </section>
                </div>
            `;
            modalOverlay.classList.remove('hidden');
            modalOverlay.classList.add('flex');
        }

        function closeModal() { modalOverlay.classList.add('hidden'); modalOverlay.classList.remove('flex'); }

        async function applyToJob(idx) {
            addLog(`🤖 Candidatando para: ${allJobs[idx].title}...`, 'success');
            fetch(`/api/apply/${idx}`, { method: 'POST' });
        }

        fetchJobs();
    </script>
</body>
</html>
